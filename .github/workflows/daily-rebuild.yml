name: Daily Build & SEO Audit

on:
  schedule:
    - cron: "0 20 * * *"   # daily at 20:00 UTC
  workflow_dispatch:

jobs:
  audit-and-build:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GOOGLE_SITE_VERIFICATION: ${{ secrets.GOOGLE_SITE_VERIFICATION }}
      BING_SITE_VERIFICATION: ${{ secrets.BING_SITE_VERIFICATION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate SEO indexes and sitemaps
        run: npm run generate:seo

      - name: Validate slugs
        run: npm run validate:slugs

      - name: Validate data integrity
        run: npm run validate:data

      - name: Validate external links (sample)
        run: npm run validate:external-links || echo "External link warnings (non-blocking)"

      - name: Validate assets
        run: npm run validate:assets

      - name: Validate accessibility
        run: npm run validate:accessibility

      - name: Validate content quality
        run: npm run validate:content

      - name: Validate JSON-LD
        run: npm run validate:jsonld

      - name: Validate internal links
        run: npm run validate:links

      - name: Validate canonicals
        run: npm run validate:canonicals

      - name: Validate sitemaps
        run: npm run validate:sitemaps

      - name: Check word counts
        run: npm run check:words

      - name: Enforce internal links
        run: npm run validate:internal-links

      - name: Generate trust & authority reports
        run: node scripts/generate_reports.js

      - name: Build production bundle
        run: npm run build

      - name: Upload reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: trust-reports-${{ github.run_number }}
          path: reports/
          retention-days: 30

      - name: Deploy to production
        if: github.ref == 'refs/heads/main'
        run: npm run deploy:prod
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
